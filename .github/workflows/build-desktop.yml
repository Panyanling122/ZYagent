name: Build Desktop App

on:
  push:
    branches: [main, master]
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "desktop/**"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            name: Linux
          - platform: windows-latest
            args: ""
            name: Windows
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            name: macOS

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Install Rust (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          rustup show

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev pkg-config

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm install

      - name: Set production API endpoint
        working-directory: ./desktop
        shell: bash
        run: |
          sed -i.bak 's/localhost:3001/120.55.37.196:3001/g' src/api/client.ts
          sed -i.bak 's/localhost:3003/120.55.37.196:3003/g' src/hooks/useWebSocket.ts
          rm -f src/api/client.ts.bak src/hooks/useWebSocket.ts.bak

      - name: Build frontend (separate step for clear errors)
        working-directory: ./desktop
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: 1
        with:
          projectPath: ./desktop
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
