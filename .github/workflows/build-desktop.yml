name: Build macOS Desktop App

on:
  push:
    branches: [main, master]
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "desktop/**"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    name: macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm install

      - name: Set production API endpoint
        working-directory: ./desktop
        shell: bash
        run: |
          sed -i.bak 's/localhost:3001/120.55.37.196:3001/g' src/api/client.ts
          sed -i.bak 's/localhost:3003/120.55.37.196:3003/g' src/hooks/useWebSocket.ts
          rm -f src/api/client.ts.bak src/hooks/useWebSocket.ts.bak

      - name: Build frontend
        working-directory: ./desktop
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: 1
        with:
          projectPath: ./desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
