name: Build Desktop App

on:
  push:
    branches: [main, master]
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "desktop/**"
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            name: Linux
          - platform: windows-latest
            args: ""
            name: Windows
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            name: macOS

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev pkg-config

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: npm install

      - name: Modify API endpoint to production
        working-directory: ./desktop
        run: |
          sed -i 's/localhost:3001/120.55.37.196:3001/g' src/api/client.ts
          sed -i 's/localhost:3003/120.55.37.196:3003/g' src/hooks/useWebSocket.ts

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./desktop
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
